name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  binaries:
    name: Terminal binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      # This produces an UNSIGNED debug APK, suitable only for sideloading
      # (users must enable "install from unknown sources"). It is not a
      # release-signed build and should not be published to app stores.
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aero-shutter-mobile-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Rename APK for release
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "aero-shutter-mobile-${{ github.ref_name }}-debug.apk"

      - name: Attach APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/aero-shutter-mobile-${{ github.ref_name }}-debug.apk
