name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  binaries:
    name: Terminal binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      # Derive the semver (tag without a leading "v") for stamping into both the
      # web bundle (__APP_VERSION__) and the Android versionName.
      - name: Derive app version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Stamp the real release version into the bundled web assets so the
      # running app reports its true version (see vite.config.ts __APP_VERSION__).
      - name: Build web assets
        run: npm run build
        env:
          APP_VERSION: ${{ steps.version.outputs.value }}

      - name: Sync Capacitor Android project
        run: npx cap sync android

      # This produces an UNSIGNED debug APK, suitable only for sideloading
      # (users must enable "install from unknown sources"). It is not a
      # release-signed build and should not be published to app stores.
      # Stamp versionName (tag semver) and versionCode (run number) into the APK
      # via gradle project properties that android/app/build.gradle reads.
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug \
            -PversionName="${{ steps.version.outputs.value }}" \
            -PversionCode="${{ github.run_number }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aero-shutter-mobile-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Rename APK for release
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "aero-shutter-mobile-${{ github.ref_name }}-debug.apk"

      - name: Attach APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/aero-shutter-mobile-${{ github.ref_name }}-debug.apk

  ota-bundle:
    name: OTA web bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Derive app version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Builds the OTA web bundle with a RELATIVE base ('./') so assets resolve
      # inside the native webview regardless of the served path. Output is in
      # mobile/dist-ota with index.html at its root. APP_VERSION stamps the
      # bundle's __APP_VERSION__ so the running app reports its true version.
      - name: Build OTA web bundle
        run: npm run build:ota
        env:
          APP_VERSION: ${{ steps.version.outputs.value }}

      # Zip the OTA output so index.html sits at the ZIP ROOT (note the trailing
      # "/." — we archive the *contents* of dist-ota, not the directory itself).
      - name: Zip web bundle
        run: |
          cd dist-ota
          zip -r ../web-bundle.zip . -x '*.DS_Store'

      # Generate ota.json for our self-hosted manifest. Version = tag without a
      # leading "v". minNativeVersion is read from mobile/ota-min-native.txt if
      # present, else defaults to this tag's version. URL uses the stable
      # latest-download path so it never needs editing between releases.
      # The commit message is passed via env (NOT spliced into the script) and
      # the JSON is built with jq, so backticks / quotes / parentheses / newlines
      # in the message can never break the shell or corrupt the JSON.
      - name: Generate ota.json
        env:
          TAG: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          VERSION="${TAG#v}"
          if [ -f ota-min-native.txt ]; then
            MIN_NATIVE="$(head -n1 ota-min-native.txt | tr -d '[:space:]')"
          else
            MIN_NATIVE="$VERSION"
          fi
          NOTES="${COMMIT_MSG:-AeroShutter $TAG}"
          jq -n \
            --arg version "$VERSION" \
            --arg url "https://github.com/subhashraveendran/aero-shutter/releases/latest/download/web-bundle.zip" \
            --arg notes "$NOTES" \
            --arg minNativeVersion "$MIN_NATIVE" \
            '{version: $version, url: $url, notes: $notes, minNativeVersion: $minNativeVersion}' \
            > ota.json
          cat ota.json

      # Upsert onto the SAME release as the APK + binaries (action-gh-release
      # matches by tag). Asset names are exactly web-bundle.zip and ota.json so
      # the .../releases/latest/download/<name> URLs stay stable.
      - name: Attach OTA bundle + manifest to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mobile/web-bundle.zip
            mobile/ota.json
