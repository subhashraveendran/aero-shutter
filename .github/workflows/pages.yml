name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build demo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Build the browser demo under /aero-shutter/demo/ so the marketing
      # landing page (docs/index.html) can own the site root.
      - name: Build demo
        run: npm run build
        env:
          VITE_BASE: /aero-shutter/demo/

      # Assemble the published site: landing page at the root, live demo at
      # /demo/. The app is a single-URL, state-driven SPA (no client-side URL
      # routing), so a per-directory 404 fallback keeps deep links working.
      - name: Assemble site (landing + demo)
        run: |
          rm -rf ../_site && mkdir -p ../_site/demo
          cp -r dist/* ../_site/demo/
          cp ../docs/index.html ../_site/index.html
          cp ../_site/demo/index.html ../_site/demo/404.html
          cp ../docs/index.html ../_site/404.html
          touch ../_site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy demo
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
